name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Shell syntax
        run: |
          bash -n scripts/*.sh tests/test_codex_launchd_scripts.sh
      - name: Run smoke tests
        run: |
          bash tests/test_codex_launchd_scripts.sh
